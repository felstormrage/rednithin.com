[tools]
node = "20.20.2"
erlang = "28.5"
gleam = "1.16.0"
rebar = "3.27.0"

[tasks.css]
description = "Build the Tailwind stylesheet"
run = "npx tailwindcss -i styles/site.css -o static/style.css"

[tasks.build]
description = "Build stylesheet and generate the static site"
depends = ["css"]
run = "gleam run"

[tasks.dev]
description = "Start the development server"
depends = ["css"]
run = "gleam run -m me_dev"

[tasks.test]
description = "Run tests and format checks"
run = [
  "gleam deps download",
  "gleam test",
  "gleam format --check src test",
]
